name: Morphed YouTube Music Mirror APKs

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

env:
  APP_DISPLAY: YouTube Music
  APP_SLUG_ARM64: youtube-music-arm64-v8a-morphe
  APP_SLUG_ARMV7: youtube-music-armeabi-v7a-morphe

jobs:
  check-version:
    runs-on: ubuntu-latest

    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}

      version: ${{ steps.pick.outputs.version }}
      tag: ${{ steps.pick.outputs.tag }}
      release_title: ${{ steps.pick.outputs.release_title }}

      arm64_name: ${{ steps.pick.outputs.arm64_name }}
      arm64_url: ${{ steps.pick.outputs.arm64_url }}

      armv7_name: ${{ steps.pick.outputs.armv7_name }}
      armv7_url: ${{ steps.pick.outputs.armv7_url }}

    steps:
      - name: Fetch latest upstream release JSON
        run: |
          curl -fsSL \
            "https://api.github.com/repos/RookieEnough/Morphe-AutoBuilds/releases/latest" \
            -o release.json

      - name: Pick APKs and extract version
        id: pick
        shell: bash
        run: |
          set -euo pipefail

          ARM64_NAME=$(jq -r --arg SLUG "$APP_SLUG_ARM64" '
            .assets[]
            | select(.name | ascii_downcase | startswith($SLUG | ascii_downcase))
            | select(.name | test("\\.apk$"; "i"))
            | .name
          ' release.json | head -n 1)

          ARMV7_NAME=$(jq -r --arg SLUG "$APP_SLUG_ARMV7" '
            .assets[]
            | select(.name | ascii_downcase | startswith($SLUG | ascii_downcase))
            | select(.name | test("\\.apk$"; "i"))
            | .name
          ' release.json | head -n 1)

          if [ -z "${ARM64_NAME:-}" ] || [ "$ARM64_NAME" = "null" ]; then
            echo "Missing arm64-v8a APK."
            exit 1
          fi

          if [ -z "${ARMV7_NAME:-}" ] || [ "$ARMV7_NAME" = "null" ]; then
            echo "Missing armeabi-v7a APK."
            exit 1
          fi

          ARM64_URL=$(jq -r --arg NAME "$ARM64_NAME" '
            .assets[]
            | select(.name == $NAME)
            | .browser_download_url
          ' release.json)

          ARMV7_URL=$(jq -r --arg NAME "$ARMV7_NAME" '
            .assets[]
            | select(.name == $NAME)
            | .browser_download_url
          ' release.json)

          VERSION=$(printf '%s\n' "$ARM64_NAME" | \
            sed -n 's/.*-v\([0-9][0-9.]*\)\.apk$/\1/p')

          if [ -z "${VERSION:-}" ]; then
            echo "Could not extract version."
            exit 1
          fi

          TAG="v${VERSION}"
          RELEASE_TITLE="${APP_DISPLAY} v${VERSION}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "release_title=$RELEASE_TITLE" >> "$GITHUB_OUTPUT"

          echo "arm64_name=$ARM64_NAME" >> "$GITHUB_OUTPUT"
          echo "arm64_url=$ARM64_URL" >> "$GITHUB_OUTPUT"

          echo "armv7_name=$ARMV7_NAME" >> "$GITHUB_OUTPUT"
          echo "armv7_url=$ARMV7_URL" >> "$GITHUB_OUTPUT"

          echo "Version: $VERSION"
          echo "ARM64 APK: $ARM64_NAME"
          echo "ARMv7 APK: $ARMV7_NAME"

      - name: Check if version already exists
        id: compare
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          if gh release view "${{ steps.pick.outputs.tag }}" \
            -R "$GITHUB_REPOSITORY" >/dev/null 2>&1; then

            echo "Version already exists. Skipping build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version detected."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  mirror:
    needs: check-version
    if: needs.check-version.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download ARM64 APK
        run: |
          curl -fL "${{ needs.check-version.outputs.arm64_url }}" \
            -o "${{ needs.check-version.outputs.arm64_name }}"

          ls -lh "${{ needs.check-version.outputs.arm64_name }}"

      - name: Download ARMv7 APK
        run: |
          curl -fL "${{ needs.check-version.outputs.armv7_url }}" \
            -o "${{ needs.check-version.outputs.armv7_name }}"

          ls -lh "${{ needs.check-version.outputs.armv7_name }}"

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.check-version.outputs.tag }}" \
            "${{ needs.check-version.outputs.arm64_name }}" \
            "${{ needs.check-version.outputs.armv7_name }}" \
            -R "$GITHUB_REPOSITORY" \
            --title "${{ needs.check-version.outputs.release_title }}" \
            --notes "## YouTube Music Morphe Mirror

          Mirrored from \`RookieEnough/Morphe-AutoBuilds\`

          - Version: \`${{ needs.check-version.outputs.version }}\`
          - ARM64 APK: \`${{ needs.check-version.outputs.arm64_name }}\`
          - ARMv7 APK: \`${{ needs.check-version.outputs.armv7_name }}\`

          This workflow only runs when the APK version changes." \
            --latest
